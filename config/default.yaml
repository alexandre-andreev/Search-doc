project:
  name: search-doc
  schema_version: "1.0"

paths:
  db: "cache/semantic_index.sqlite"
  catalog: "data/catalog.xlsx"
  log: "cache/search-doc.log"

embedding:
  model: "intfloat/multilingual-e5-small"
  dim: 384
  device: "cuda"
  batch_size: 32

search:
  default_top_k: 10
  semantic_candidates: 50
  fts_candidates: 50
  rrf_k_semantic: 60
  rrf_k_fts: 200
  weights_descriptive:
    semantic: 0.85
    fts: 0.15
  weights_technical:
    semantic: 0.40
    fts: 0.60

  chunk_kind_bonus:
    title: 1.5
    summary: 1.3
    body: 1.0

  related:
    top_k: 5
    min_similarity: 0.5

chunking:
  summary_min_chars: 100
  summary_max_chars: 2000
