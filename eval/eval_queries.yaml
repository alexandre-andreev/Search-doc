# Eval-набор для семантического поиска.
#
# Каждый запрос содержит:
#   query — текст запроса (как пользователь напишет Codex'у)
#   intent — что человек на самом деле ищет (для понимания, не используется в метриках)
#   expected_in_top_5 — список фрагментов имён файлов, которые ДОЛЖНЫ быть в топ-5.
#                        Совпадение: подстрока в filename без учёта регистра.
#   expected_in_top_10 — то же, но достаточно попасть в топ-10. Используется
#                         для книг "тоже релевантные, но не идеальное попадание".
#   notes — комментарий для разработчика
#
# Эталоны составлены на основе catalog.xlsx (3180 книг, 35 разделов таксономии).
# Все ожидаемые книги ФИЗИЧЕСКИ существуют в библиотеке.
#
# Метрики:
#   Recall@5 = доля ожидаемых_in_top_5, попавших в топ-5
#   Recall@10 = доля (ожидаемых_in_top_5 ∪ in_top_10), попавших в топ-10
#   MRR = mean reciprocal rank первого попадания
#
# Критерии приёмки MVP:
#   Recall@10 ≥ 0.75 (median по запросам)
#   MRR ≥ 0.4
#   max_search_latency_s ≤ 1.0

version: "1.0"
target_library: "C:/Users/alexa/YandexDisk/Книги"

queries:

  # ─── ТЕСТИРОВАНИЕ (классический пробный запрос из постановки) ───
  - id: testing_general
    query: "книги про модульное тестирование"
    intent: "общая тема юнит-тестирования, на любом языке"
    expected_in_top_5:
      - "Python Testing with pytest"
      - "Python. Разработка на основе тестирования"
      - "Test-Driven"
    expected_in_top_10:
      - "Learning Test-Driven Development"
      - "Test Your Skills In Python"
      - "Agile-тестирование"
    notes: |
      Пробный запрос из исходной постановки задачи. Семантика должна найти
      книги даже без слова "unit testing" в названии (например,
      "Разработка на основе тестирования" - это TDD).

  - id: tdd_python
    query: "разработка через тестирование TDD на Python"
    intent: "TDD конкретно в контексте Python"
    expected_in_top_5:
      - "Python. Разработка на основе тестирования"
      - "Паттерны разработки на Python: TDD"
    expected_in_top_10:
      - "Learning Test-Driven Development"
      - "Python Testing with pytest"

  - id: pytest_specific
    query: "pytest фикстуры и параметризация"
    intent: "конкретный инструмент pytest, точный технический термин"
    expected_in_top_5:
      - "Python Testing with pytest"
    expected_in_top_10:
      - "Python. Разработка на основе тестирования"
    notes: |
      Хороший тест для гибридного поиска: "pytest" должен сильно бустить через FTS,
      а "фикстуры" и "параметризация" — через semantic.

  - id: pentest
    query: "пентестинг сетей и эксплуатация уязвимостей"
    intent: "тестирование на проникновение"
    expected_in_top_5:
      - "Penetration Testing"
      - "тестирование на проникновение"
    expected_in_top_10:
      - "Kali Linux"
      - "Black Hat Python"
      - "Violent Python"

  # ─── АРХИТЕКТУРА ───
