    intent: "конкретно про transformers / attention"
    expected_in_top_5:
      - "Transformer"
    expected_in_top_10:
      - "Attention"
      - "deep learning"
    notes: |
      В каталоге только 3 книги с Transformer в названии. Это сложный запрос,
      если выдача слабая — это сигнал, что нужно индексировать саммари.

