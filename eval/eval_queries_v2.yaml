# Eval-набор v2 для семантического поиска по библиотеке.
#
# Версия 2 (после анализа catalog.xlsx и первого прогона):
#   - Все ожидаемые книги взяты из РЕАЛЬНОГО catalog.xlsx (проверено).
#   - Учтены русские переводы английских книг как валидные совпадения.
#   - Введён новый формат критерия — "any_of_at_least":
#       пользователь искал тему, у которой в каталоге много книг.
#       Адекватный критерий — "хотя бы N из M ожидаемых книг должны попасть в топ-K".
#       Это правильная модель: пользователь хочет получить хорошую выборку, не все возможные книги.
#
# Формат запроса:
#   id: уникальный идентификатор
#   query: текст запроса
#   intent: что пользователь на самом деле ищет
#   relevant_books: список РЕАЛЬНЫХ книг из каталога (substring без регистра)
#   min_in_top_5:  минимум сколько из relevant_books должны быть в топ-5
#   min_in_top_10: минимум сколько из relevant_books должны быть в топ-10
#
# Метрики:
#   Recall@5  = min(found_in_top_5, min_in_top_5) / min_in_top_5
#   Recall@10 = min(found_in_top_10, min_in_top_10) / min_in_top_10
#   MRR       = 1 / position первого попадания любой relevant_book
#
# Критерии приёмки MVP:
#   Recall@10 ≥ 0.80 (среднее по запросам)
#   MRR       ≥ 0.50
#   max_search_latency_s ≤ 1.0

version: "2.0"
target_library: "C:/Users/alexa/YandexDisk/Книги"

queries:

  # ─── ТЕСТИРОВАНИЕ ───
  - id: testing_unit_python
    query: "модульное тестирование на Python"
